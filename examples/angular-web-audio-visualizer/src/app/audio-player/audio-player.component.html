<div class="player">
  <div class="player__upload">
    <label class="upload-button">
      <input type="file" accept="audio/*" (change)="onFileSelected($event)" />
      Choose audio file
    </label>
    @if (trackName) {
      <span class="track-name">{{ trackName }}</span>
    } @else {
      <span class="track-hint">No track loaded yet</span>
    }
  </div>

  <audio
    #audio
    (timeupdate)="onTimeUpdate()"
    (loadedmetadata)="onMetadataLoaded()"
    (ended)="onEnded()"
  ></audio>

  @if (hasAudioSource) {
    <div class="player__timeline">
      <span class="time" aria-hidden="true">{{ formatTime(currentTime) }}</span>
      <input
        type="range"
        class="seek-bar"
        min="0"
        [max]="duration || 0"
        [value]="currentTime"
        [style.--seek-progress.%]="duration ? (currentTime / duration) * 100 : 0"
        step="0.1"
        aria-label="Seek through track"
        (input)="onSeek($event)"
        (pointerdown)="onSeekStart()"
        (pointerup)="onSeekEnd()"
        (pointercancel)="onSeekEnd()"
      />
      <span class="time" aria-hidden="true">{{ formatTime(duration) }}</span>
    </div>
  }

  <div class="player__transport">
    <button
      type="button"
      class="transport-button"
      (click)="play()"
      aria-label="Play"
      [disabled]="!hasAudioSource"
    >
      <fa-icon [icon]="faPlay"></fa-icon>
    </button>
    @if (isPlaying) {
      <button
        type="button"
        class="transport-button"
        (click)="pause()"
        aria-label="Pause"
      >
        <fa-icon [icon]="faPause"></fa-icon>
      </button>
    }
    <button
      type="button"
      class="transport-button"
      (click)="stop()"
      aria-label="Stop"
      [disabled]="!hasAudioSource"
    >
      <fa-icon [icon]="faStop"></fa-icon>
    </button>
  </div>
</div>
