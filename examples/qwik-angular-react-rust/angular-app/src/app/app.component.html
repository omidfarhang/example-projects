<section class="micro-card angular-card">
  <p class="eyebrow">Angular micro frontend</p>
  <h2>Hello from Angular</h2>
  <p class="lede">
    The Qwik shell passed this message through a custom element attribute:
  </p>
  <div class="message-box">{{ message || 'No message yet' }}</div>
  <button type="button" (click)="sendMessage()">Send message to shell</button>
</section>
