<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rust WASM Performance Demo</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
      pre { background: #111; color: #eee; padding: 1rem; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>Rust WASM Performance Demo</h1>
    <p>Compare JavaScript vs WebAssembly for the same CPU-heavy loop.</p>
    <button id="run">Run benchmark</button>
    <pre id="output">Waiting...</pre>
    <script type="module">
      import init, { sum_squares } from './pkg/rust_wasm_performance_demo.js';

      const iterations = 5_000_000;
      const output = document.getElementById('output');
      const run = document.getElementById('run');

      function jsSumSquares(n) {
        let total = 0;
        for (let i = 0; i < n; i += 1) {
          total += i * i;
        }
        return total;
      }

      run.addEventListener('click', async () => {
        await init();
        const jsStart = performance.now();
        const jsResult = jsSumSquares(iterations);
        const jsMs = performance.now() - jsStart;

        const wasmStart = performance.now();
        const wasmResult = sum_squares(iterations);
        const wasmMs = performance.now() - wasmStart;

        output.textContent = [
          `iterations: ${iterations}`,
          `javascript: ${jsMs.toFixed(2)} ms, result=${jsResult}`,
          `wasm:       ${wasmMs.toFixed(2)} ms, result=${wasmResult}`,
        ].join('\n');
      });
    </script>
  </body>
</html>
